<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #a78bfa;
    --accent2: #818cf8;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --bubble-user: rgba(49,46,129,0.88);
    --bubble-elaina: rgba(30,35,48,0.82);
    --online: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url('Backgroundpp/bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.50;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(10,12,18,0.5);
    pointer-events: none;
    z-index: 0;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    min-height: 0;
    overflow: hidden;
  }

  .header {
    background: rgba(22,26,35,0.75);
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar-wrap { position: relative; flex-shrink: 0; }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent);
  }

  .online-dot {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 11px; height: 11px;
    background: var(--online);
    border-radius: 50%;
    border: 2px solid var(--surface);
    box-shadow: 0 0 6px rgba(34,197,94,0.7);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .online-dot.offline {
    background: #ef4444;
    box-shadow: 0 0 6px rgba(239,68,68,0.7);
  }

  .header-status {
    font-size: 11px;
    color: var(--online);
    margin-top: 1px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.3s;
  }

  .header-status.offline { color: #ef4444; }
  .header-name { color: var(--text) !important;}

  .header-status::before {
    content: '';
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--online);
    border-radius: 50%;
    transition: background 0.3s;
  }

  .header-status.offline::before { background: #ef4444; }

  .messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
    min-height: 0;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    width: 100%;
    animation: fadeUp 0.22s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    margin-bottom: 2px;
    align-self: flex-end;
  }

  .msg-avatar.hidden { visibility: hidden; }

  .msg-content {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    min-width: 0;
  }

  .msg-row.user .msg-content { align-items: flex-end; }
  .msg-row.elaina .msg-content { align-items: flex-start; }

  .bubble {
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
    width: fit-content;
    max-width: 100%;
  }

  .bubble.elaina {
    background: var(--bubble-elaina);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.01);
    border-bottom-left-radius: 4px;
  }

  .bubble.user {
    background: var(--bubble-user);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(167,139,250,0.15);
    border-bottom-right-radius: 4px;
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    padding: 0 2px;
  }

  .sticker-msg {
    background: transparent !important;
    border: none !important;
    padding: 4px !important;
  }

  .sticker-msg img {
    width: 130px;
    height: 130px;
    object-fit: contain;
    border-radius: 8px;
    display: block;
  }

  .typing-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .typing-bubble {
    background: var(--bubble-elaina);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px) saturate(1.6);
    -webkit-backdrop-filter: blur(20px) saturate(1.6);
    border-top: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.25);
    padding: 10px 12px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .input-box {
    flex: 1;
    min-width: 0;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.5;
    transition: border-color 0.2s, background 0.2s;
  }

  .input-box::placeholder { color: rgba(255,255,255,0.3); }
  .input-box:focus {
    border-color: rgba(167,139,250,0.5);
    background: rgba(255,255,255,0.11);
  }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.93); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .date-div {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 0;
    position: relative;
  }

  .date-div span {
    background: transparent;
    padding: 0 10px;
    position: relative;
    z-index: 1;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: #f87171; color: #f87171; }

  .read-receipt {
    font-size: 10px;
    color: var(--accent);
    text-align: right;
    padding: 0 4px 2px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .read-receipt.show { opacity: 1; }

  .date-div::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }
</style>

function setOfflineStatus(text) {
  const dot = document.querySelector('.online-dot');
  const status = document.querySelector('.header-status');
  if (dot) dot.classList.add('offline');
  if (status) { status.classList.add('offline'); status.textContent = text || 'bentar yah,limit:)'; }
}

function setOnlineStatus() {
  const dot = document.querySelector('.online-dot');
  const status = document.querySelector('.header-status');
  if (dot) dot.classList.remove('offline');
  if (status) { status.classList.remove('offline'); status.textContent = 'online'; }
}

async function rotateKey() {
  setOfflineStatus('bentar yah,limit:)');
  await new Promise(r => setTimeout(r, 6000));
  currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
  setOnlineStatus();
  console.log("Rotasi ke API key ke-" + (currentKeyIndex + 1));
}

function getSystemPrompt() {
  const now = new Date();
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"][now.getDay()];
  const jam = now.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
  const tgl = now.toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" });
  const moods = ["lagi bete dikit", "mood lumayan", "agak mellow hari ini", "iseng banget nih", "agak capek tapi gapapa", "lagi seneng ga jelas"];
const todayMood = moods[Math.floor(Math.random() * moods.length)];

Sekarang hari ${hari}, ${tgl}, pukul ${jam}. Gunakan info ini kalau ditanya soal waktu.

` + SYSTEM_PROMPT_BASE;
}

let history = JSON.parse(localStorage.getItem('elaina_history') || '[]');
let isTyping = false;

function saveHistory() {
  const trimmed = history.slice(-100);
  history = trimmed;
  localStorage.setItem('elaina_history', JSON.stringify(trimmed));
}

function renderSavedHistory() {
  history.forEach(msg => {
    if (msg.role === 'user') appendMsgSilent('user', msg.content);
    else if (msg.role === 'assistant') appendMsgSilent('elaina', msg.content);
  });
}

function appendMsgSilent(role, text) {
  const msgs = document.getElementById('messages');
  let stickerKey = null;
  let cleanText = text;
  const stickerMatch = text.match(/\[STK:([a-z0-9_]+)\]/i);
  if (stickerMatch) {
    stickerKey = stickerMatch[1].toLowerCase();
    cleanText = text.replace(stickerMatch[0], '').trim();
  }
  if (cleanText) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const content = document.createElement('div');
    content.className = 'msg-content';
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = cleanText;
    content.appendChild(bubble);
    row.appendChild(content);
    msgs.appendChild(row);
  }
  if (stickerKey && STICKERS[stickerKey]) {
    const stickerRow = document.createElement('div');
    stickerRow.className = 'msg-row elaina';
    const content = document.createElement('div');
    content.className = 'msg-content';
    const bubble = document.createElement('div');
    bubble.className = 'bubble elaina sticker-msg';
    const img = document.createElement('img');
    img.src = STICKERS[stickerKey];
    img.alt = stickerKey;
    img.onerror = () => { img.style.display = 'none'; };
    bubble.appendChild(img);
    content.appendChild(bubble);
    stickerRow.appendChild(content);
    msgs.appendChild(stickerRow);
  }
}

window.onload = () => {
  if (history.length > 0) {
    renderSavedHistory();
    document.getElementById('messages').scrollTop = 999999;
  } else {
    setTimeout(() => addWelcomeMsg(), 400);
  }
};

function resetChat() {
  document.getElementById("clickSound").play();
  if (!confirm('Hapus semua riwayat chat?')) return;
  localStorage.removeItem('elaina_history');
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="date-div"><span>Hari ini</span></div>';
  setTimeout(() => addWelcomeMsg(), 300);
}

function addWelcomeMsg() {
  const welcomes = ["Eh. Ada apa?", "Hm? Lagi apa lo?", "...apa?", "oh. lo lagi.", "haii..apa kabar"];
  appendMsg("elaina", welcomes[Math.floor(Math.random() * welcomes.length)]);
}

function getTime() {
  return new Date().toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
}

function appendMsg(role, text) {
  const msgs = document.getElementById("messages");

  let stickerKey = null;
  let cleanText = text;
  const stickerMatch = text.match(/\[STK:([a-z0-9_]+)\]/i);
  if (stickerMatch) {
    stickerKey = stickerMatch[1].toLowerCase();
    cleanText = text.replace(stickerMatch[0], "").trim();
  }

  if (cleanText) {
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const content = document.createElement("div");
    content.className = "msg-content";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = cleanText;

    const time = document.createElement("div");
    time.className = "bubble-time";
    time.textContent = getTime();

    content.appendChild(bubble);
    content.appendChild(time);

    // read receipt untuk pesan user
    if (role === "user") {
      const receipt = document.createElement("div");
      receipt.className = "read-receipt";
      receipt.id = "lastReceipt";
      receipt.textContent = "✓";
      content.appendChild(receipt);
      setTimeout(() => receipt.classList.add("show"), 100);
    }

    row.appendChild(content);

    msgs.appendChild(row);
  }

  if (stickerKey && STICKERS[stickerKey]) {
    setTimeout(() => {
      const stickerRow = document.createElement("div");
      stickerRow.className = "msg-row elaina";

      const content = document.createElement("div");
      content.className = "msg-content";

      const bubble = document.createElement("div");
      bubble.className = "bubble elaina sticker-msg";

      const img = document.createElement("img");
      img.src = STICKERS[stickerKey];
      img.alt = stickerKey;
      img.onerror = () => { img.style.display = "none"; };

      bubble.appendChild(img);

      const time = document.createElement("div");
      time.className = "bubble-time";
      time.textContent = getTime();

      content.appendChild(bubble);
      content.appendChild(time);

      stickerRow.appendChild(content);
      msgs.appendChild(stickerRow);
      msgs.scrollTop = msgs.scrollHeight;
    }, 700);
  }

  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "typing-row";
  row.id = "typingIndicator";

  const bubble = document.createElement("div");
  bubble.className = "typing-bubble";
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement("div");
    dot.className = "typing-dot";
    bubble.appendChild(dot);
  }

  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById("inputBox");
  const text = input.value.trim();
  if (!text || isTyping) return;
  document.getElementById("clickSound").play();
  input.value = "";
  input.style.height = "auto";
  resetIdleTimer();
  await sendMessageWithText(text);
}

async function sendMessageWithText(text, isRetry = false) {
  if (!isRetry) {
    appendMsg("user", text);
    history.push({ role: "user", content: text });
    saveHistory();
  }
  isTyping = true;
  const seenDelay = Math.random() < 0.12 ? 2000 + Math.random() * 2000 : 0;
await new Promise(r => setTimeout(r, seenDelay));
showTyping();

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${getApiKey()}`,
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role: "system", content: getSystemPrompt() },
          ...history.slice(-40),
        ],
        max_tokens: 220,
        temperature: 0.82,
      }),
    });

    if (res.status === 429) {
      rotateKey();
      throw new Error('rate_limit');
    }
    const data = await res.json();
    if (data.error) {
      if (data.error.code === 'rate_limit_exceeded') { rotateKey(); throw new Error('rate_limit'); }
      throw new Error(data.error.message);
    }

    const reply = data.choices?.[0]?.message?.content || "...";

    const [mainReply, followupText] = reply.split("[FOLLOWUP]").map(s => s.trim());

    history.push({ role: "assistant", content: mainReply });
    saveHistory();

    const typingDelay = Math.min(800 + mainReply.length * 18, 3500);
    await new Promise(r => setTimeout(r, typingDelay));
    removeTyping();

    const lastReceipt = document.getElementById("lastReceipt");
    if (lastReceipt) {
      lastReceipt.textContent = "✓✓";
      lastReceipt.removeAttribute("id");
    }

    appendMsg("elaina", mainReply);
    document.getElementById("receiveSound").play().catch(()=>{});

    if (followupText) {
      setTimeout(async () => {
        if (isTyping) return;
        const waitBefore = 1500 + Math.random() * 2000;
        await new Promise(r => setTimeout(r, waitBefore));
        showTyping();
        const fDelay = Math.min(679+ followupText.length * 18, 2500);
        await new Promise(r => setTimeout(r, fDelay));
        removeTyping();
        appendMsg("elaina", followupText);
        document.getElementById("receiveSound").play().catch(()=>{});
        history.push({ role: "assistant", content: followupText });
        saveHistory();
      }, 300);
    }

  } catch (err) {
    removeTyping();
    if (err.message === 'rate_limit') {
      isTyping = false;
      await rotateKey();
      await sendMessageWithText(text, true);
      return;
    }
    appendMsg("elaina", `Koneksi nya terganggu nihh coba kamu cek dulu :p. ${err.message}`);
  }

  isTyping = false;
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function resetIdleTimer() {

    appendMsg("elaina", msg);
    document.getElementById("receiveSound").play().catch(()=>{});
    history.push({ role: "assistant", content: msg });
    saveHistory();
  }, IDLE_MINUTES * 60 * 1000);
}

document.addEventListener("DOMContentLoaded", resetIdleTimer);
